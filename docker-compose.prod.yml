version: '3.8'

# Load all secrets from .env.prod
# Run as: docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      # CMD-SHELL required for pipe operator to work
      test: [ "CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    # No ports: exposed — Kafka is internal only in production.
    # Only containers on the Docker network can reach kafka:9092.
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_NUM_PARTITIONS: 3

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    # No ports: exposed — DB is internal only in production.
    # Direct internet access to port 5432 is a security risk.
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init-db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  producer:
    build:
      context: ./producer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_started
    environment:
      KAFKA_BROKER: kafka:9092
      SYMBOL: ${SYMBOL}

  consumer:
    build:
      context: ./consumer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      DB_URL: ${DB_URL}

  api:
    build:
      context: ./api
    restart: unless-stopped
    # No ports: exposed — Nginx proxies to api:8000 internally.
    # Port 8000 never touches the public internet.
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL}

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80" # only nginx faces the internet
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dashboard:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  timescaledb_data:
