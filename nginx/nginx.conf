worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;

    # gzip reduces static asset sizes by ~70%
    # dashboard JS + HTML loads faster for users
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/javascript;

    server {
        listen 80;

        # ── Static dashboard ──────────────────────────────
        # Nginx serves index.html directly from disk.
        # Zero Python/uvicorn involvement for the dashboard.
        location / {
            root  /usr/share/nginx/html;
            index index.html;
        }

        # ── REST API ──────────────────────────────────────
        # /api/ohlcv → http://api:8000/ohlcv
        # /api/health → http://api:8000/health
        # Nginx strips the /api prefix before forwarding.
        location /api/ {
            proxy_pass         http://api:8000/;
            proxy_set_header   Host        $host;
            proxy_set_header   X-Real-IP   $remote_addr;
        }

        # ── WebSocket live feed ───────────────────────────
        # WebSocket upgrade requires HTTP/1.1 +
        # Upgrade + Connection headers — HTTP/1.0 doesn't
        # support persistent connections needed for WS.
        #
        # proxy_read_timeout 3600s: Nginx default is 60s.
        # Without this, Nginx kills idle WS connections
        # every 60s and the dashboard reconnects constantly.
        location /ws/ {
            proxy_pass          http://api:8000/ws/;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_set_header    X-Real-IP  $remote_addr;
            proxy_read_timeout  3600s;
        }
    }
}
